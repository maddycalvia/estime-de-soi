<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  const DARK="#2a1f1a", MID="#6b5246", BG="#F0ECE6", BG2="#F7F4F0", LIGHT="#aaaaaa", ACCENT="#8B6F5E";
  const EMAILJS_SERVICE_ID  = "service_0kouxat";
  const EMAILJS_TEMPLATE_ID = "template_kt263tv";
  const EMAILJS_PUBLIC_KEY  = "uhjbdrXFqWGx4Rltl";

  // ─── 12 PROFILS (6 traits de base + Confiant Créateur + 5 troubles) ──────────
  const TYPES = {
    CONFIANT:   {id:"CONFIANT",   famille:"Métabolisé", niveau:"métabolisé", label:"Le/La Confiant(e)",    icon:"🌿", color:"#4A7C6E", light:"#EBF5F2", border:"#A8D4CA", famColor:"#4A7C6E", famBg:"#EBF5F2",
      resume:"Tu participes au monde naturellement, sans avoir besoin qu'il tourne autour de toi ni sans en disparaître. Tu te sens suffisamment solide pour aller vers les autres, prendre des risques et traverser les épreuves.",
      portrait:`Tu incarnes une estime de soi équilibrée — ce qu'on appelle «métabolisée». Tu n'es ni dans l'effacement ni dans la démonstration. Tu prends ta place sans l'imposer, tu participes au monde sans en dépendre.\n\nTa confiance n'est pas l'absence de doute — c'est la capacité à douter sans se perdre. Tu peux traverser les critiques, les échecs ou les incertitudes sans que cela remette en cause qui tu es fondamentalement.\n\nIl y a en toi une dimension créatrice : tu aimes apporter quelque chose, contribuer à quelque chose qui a du sens. Pas forcément artistique — mais l'idée de laisser une trace, d'ajouter de la valeur au monde t'anime naturellement.`,
      forces:["Stabilité intérieure face aux aléas","Capacité à donner sans se perdre","Confiance qui n'a pas besoin d'être prouvée","Résilience face aux épreuves et aux critiques"],
      points:["Peut être incompris(e) par des profils plus insécures","Peut sous-estimer ses propres besoins","La sécurité peut se fragiliser sous stress prolongé"],
      conseils:["💬 Ta confiance est une ressource précieuse — mais elle mérite d'être entretenue. Les périodes de grand stress ou de deuil peuvent temporairement fragiliser ce qui semble solide.","💬 Tu as naturellement une capacité créatrice. T'interroger sur ce que tu veux vraiment construire ou transmettre peut être un levier de sens et d'épanouissement.","💬 Ton équilibre peut être mis à l'épreuve dans des relations avec des profils très insécures. Nommer la dynamique t'aide à rester ancré(e) sans te laisser absorber."]},
    EFFACE:     {id:"EFFACE",     famille:"Hypo",        niveau:"trait", label:"L'Effacé(e)",          icon:"🌫️", color:"#6E7FA8", light:"#EEF1F8", border:"#B8C4DC", famColor:"#5A6E9E", famBg:"#E8ECF6",
      resume:"Tu t'organises pour te faire oublier, laisser la place aux autres, ne pas déranger. Tu vas vers le besoin de l'autre avant même de consulter le tien. Le monde peut très bien tourner sans toi — c'est souvent ce que tu crois.",
      portrait:`Ton style d'estime est hypo : tu te mets en retrait, pas par modestie, mais parce que quelque chose en toi croit que ta place est petite, voire inexistante.\n\nTu as appris à t'organiser autour des besoins des autres — parfois si naturellement que tu ne t'en rends plus compte. Tu anticipes, tu t'adaptes, tu cèdes. Et au fond, tu peux trouver «normal» d'être en second plan, voire d'être maltraité(e).\n\nTa discrétion est réelle, mais elle te coûte. Elle t'expose aussi : les personnes à fort ego ont souvent un «radar» pour repérer ceux qui ne défendent pas leur place. Non par méchanceté de ta part — mais parce que tu n'as pas encore intégré que ta présence a de la valeur en elle-même.`,
      forces:["Écoute fine et empathie profonde","Capacité à s'adapter et à prendre soin","Peu d'arrogance ou de besoin de dominer","Douceur dans le contact avec les autres"],
      points:["Tendance à s'effacer au détriment de ses propres besoins","Attire parfois des personnes qui profitent de cette discrétion","Difficulté à poser des limites ou à prendre de la place"],
      conseils:["💬 L'effacement n'est pas de la générosité — c'est souvent une façon ancienne de se protéger en se rendant petit(e). Nommer ça est déjà un premier pas.","💬 Apprendre à consulter ton propre besoin avant de répondre à celui de l'autre est un travail lent mais transformateur. La question «et moi, qu'est-ce que je veux ?» mérite d'être posée régulièrement.","💬 Un accompagnement peut t'aider à explorer d'où vient ce réflexe d'effacement et à réapprendre que ta place — ta vraie place — est légitime."]},
    DOUTANT:    {id:"DOUTANT",    famille:"Hypo",        niveau:"trait", label:"Le/La Doutant(e)",     icon:"🌀", color:"#7A6EA8", light:"#F0EEF8", border:"#C4B8DC", famColor:"#5A6E9E", famBg:"#E8ECF6",
      resume:"Tu hésites, tu remets en question, tu t'auto-invalides. L'énergie est là, mais elle reste dans la tête — en mouvement permanent, sans jamais se poser dans une décision ou une action.",
      portrait:`Contrairement à l'effacé qui reste dans son retrait, toi tu voudrais avancer — mais quelque chose bloque. L'énergie tourne, les idées foisonnent, les possibilités s'empilent… et au final, rien ne se met en place.\n\nTu doutes de toi, de tes choix, et parfois de l'humanité tout entière. Ton discours intérieur est souvent négatif, ton imaginaire teinté de scénarios sombres. L'angoisse s'exprime par le doute plutôt que par la panique — mais elle est bien là.\n\nIl y a quelque chose d'épuisant dans cette façon de fonctionner : l'énergie mobilisée est réelle, mais elle ne trouve pas de sortie vers l'action. Tu t'auto-invalides avant même d'essayer — «à quoi bon», «ça ne marchera pas», «ce n'est pas pour moi».`,
      forces:["Capacité d'analyse et de réflexion profonde","Prudence naturelle face aux décisions importantes","Sensibilité aux nuances et à la complexité","Potentiel de transformation une fois le blocage levé"],
      points:["Difficulté à passer à l'action et à décider","Épuisement lié au mouvement intérieur permanent","Discours intérieur très auto-critique","Tendance à s'invalider avant même d'essayer"],
      conseils:["💬 Le doute chronique est souvent une angoisse déguisée. Ce n'est pas un manque d'intelligence — c'est une émotion qui cherche à se faire entendre autrement.","💬 Travailler sur la régulation émotionnelle (et non sur la prise de décision) est souvent la vraie clé. Quand l'angoisse diminue, les choix deviennent plus accessibles.","💬 Un accompagnement ciblé peut t'aider à distinguer ce qui relève d'une vraie réflexion et ce qui relève d'une auto-invalidation automatique — et à laisser l'énergie se poser enfin dans l'action."]},
    FLAMBOYANT: {id:"FLAMBOYANT", famille:"Hyper",       niveau:"trait", label:"Le/La Flamboyant(e)", icon:"🔥", color:"#C97A3A", light:"#FDF3EB", border:"#E8C09A", famColor:"#B85C2E", famBg:"#FDF0E8",
      resume:"Tu occupes l'espace, tu aimes briller, tu te mets en avant. Tu es très sensible aux compliments — et très vulnérable à la critique, qui touche directement ton être, pas juste tes actes.",
      portrait:`Ton style d'estime est hyper : tu as besoin que le monde te voit, te reconnaisse, t'admire. Ce n'est pas de l'arrogance superficielle — c'est une façon de couvrir des failles profondes que tu n'as pas envie de montrer.\n\nTu es intelligent(e), souvent séduisant(e), tu sais occuper une pièce. Les compliments te nourrissent, et les critiques te blessent bien plus profondément que tu ne veux l'admettre — parce que te critiquer, c'est attaquer ton être, pas juste un de tes actes.\n\nIl peut t'arriver d'être méprisant(e) envers les autres — pointer leurs failles, les regarder de haut. C'est une façon de garder l'avantage, de ne jamais être en position de vulnérabilité. Mais cette armure a un coût : elle maintient les autres à distance et toi dans un rôle épuisant à tenir.`,
      forces:["Charisme et capacité à entraîner les autres","Intelligence et présence remarquée","Ambition et goût de l'excellence","Énergie et engagement dans ce qui te passionne"],
      points:["Vulnérabilité masquée derrière une façade forte","Difficulté à tolérer la critique sans se sentir attaqué(e)","Dépendance au regard et à la validation extérieure"],
      conseils:["💬 La flamboyance est souvent une armure construite tôt pour ne pas montrer qu'on se sent insuffisant(e). Reconnaître ça intérieurement est un acte de courage réel.","💬 Travailler à distinguer la critique de l'attaque personnelle est une compétence clé pour toi. Ce n'est pas ta valeur qui est remise en cause — c'est un acte, un comportement, une idée.","💬 La dépression narcissique guette parfois avec l'âge ou les échecs. Un accompagnement préventif, avant d'en arriver là, est souvent plus efficace."]},
    SOUHAIT:    {id:"SOUHAIT",    famille:"Hyper",       niveau:"trait", label:"Le/La Souhaitant(e)", icon:"☁️", color:"#8B7AB8", light:"#F3F0FA", border:"#C8BCE8", famColor:"#B85C2E", famBg:"#FDF0E8",
      resume:"Tu as une haute idée de toi-même, mais tu restes dans le fantasme. Tu accumules les formations, les projets, les rêves — sans jamais tout à fait passer à l'action ni te confronter à la réalité.",
      portrait:`Il y a en toi une image grandiose de ce que tu pourrais être, accomplir, devenir. Cette image est sincère — mais elle reste dans le domaine du souhait. Quelque chose t'empêche de la confronter au principe de réalité.\n\nTu enchaînes peut-être les formations sans t'en servir, les projets sans les finaliser, les plans sans les mettre en œuvre. Ce n'est pas de la paresse — c'est que l'idée de toi-même est trop haute pour risquer l'échec. Agir, c'est se confronter à une limite possible. Et cette limite-là serait insupportable.\n\nIl y a aussi une dimension de démesure dans tes aspirations : ce que tu imagines dépasse souvent ce qui est réalisable, non pas par manque de capacités, mais parce que l'énergie reste bloquée dans la grandiosité plutôt que de se déposer dans l'action concrète.`,
      forces:["Vision large et pensée ambitieuse","Richesse imaginaire et créativité","Capacité de projection et d'inspiration","Potentiel réel — souvent sous-exploité"],
      points:["Difficulté à aller au contact du réel et de ses limites","Accumulation sans finalisation ni utilisation","Énergie bloquée dans le fantasme plutôt que dans l'action"],
      conseils:["💬 Le fossé entre qui tu imagines être et qui tu es dans le concret peut être une source de souffrance silencieuse. La nommer est déjà un acte courageux.","💬 L'enjeu pour toi n'est pas de revoir tes ambitions à la baisse — c'est d'apprendre à tolérer la confrontation au réel. C'est là que la vraie estime se construit.","💬 Un travail sur l'action concrète, pas à pas, même imparfaite, est souvent plus transformateur que de continuer à préparer le terrain. «Fait» vaut mieux que «parfait»."]},
    COMBAT:     {id:"COMBAT",     famille:"Hyper",       niveau:"trait", label:"Le/La Combattant(e)", icon:"⚡", color:"#B85C3A", light:"#FCF0EC", border:"#E8C0B0", famColor:"#B85C2E", famBg:"#FDF0E8",
      resume:"Tu cherches le contact — mais souvent sous forme de friction, d'opposition, de combat. Tu es dans le contre, dans la résistance permanente. Ton ego est fort, et il a du mal à tolérer la contradiction sans la vivre comme une menace.",
      portrait:`Tu vas au contact — mais le contact pour toi prend souvent la forme d'une confrontation. Tu te retrouves régulièrement en opposition : avec les idées, les personnes, les systèmes. Quelque chose en toi résiste, contre-argumente, défend son territoire.\n\nCe n'est pas forcément de la malveillance — c'est un mode de relation où l'énergie s'active fortement dès qu'elle perçoit une remise en cause. Ton ego est important, et il supporte mal d'être en position basse, d'avoir tort, ou d'être ignoré.\n\nIl y a une vraie force dans cette façon d'être — une capacité à se battre pour ce qui compte, à ne pas se laisser écraser. Mais quand ce mode de combat devient permanent et indiscriminé, il épuise les relations et finit par isoler.`,
      forces:["Énergie et capacité à défendre ses positions","Courage pour aller au contact et affronter les conflits","Détermination et persistance face aux obstacles","Ne se laisse pas facilement écraser ou dominer"],
      points:["Opposition quasi-systématique, même hors de propos","Difficulté à tolérer la contradiction","Ego envahissant qui peut fermer les portes"],
      conseils:["💬 Le combat permanent est épuisant — pour toi, et pour les autres. Se demander «est-ce que je combats parce que c'est juste, ou parce que ça m'est insupportable de ne pas gagner ?» est une question puissante.","💬 Apprendre à distinguer les combats qui méritent ton énergie de ceux qui ne la méritent pas est une compétence clé. Tout ne mérite pas d'être une bataille.","💬 Un travail sur la tolérance à l'impuissance et à la vulnérabilité peut transformer ta façon d'aller au contact — en gardant ta force, mais en l'orientant différemment."]},

    // ─── MÉTABOLISÉ AVANCÉ ───────────────────────────────────────────────────────
    CONFIANT_CREATEUR: {id:"CONFIANT_CREATEUR", famille:"Métabolisé", niveau:"métabolisé", label:"Le/La Confiant(e) Créateur/Créatrice", icon:"🌱", color:"#2E7D5E", light:"#E5F5EE", border:"#8CCFB0", famColor:"#4A7C6E", famBg:"#EBF5F2",
      resume:"Ta confiance est pleinement intégrée — et elle se tourne naturellement vers quelque chose à construire ou à transmettre. Pas forcément artistique : plutôt une dimension de sens, d'apport, de valeur ajoutée pour le monde autour de toi.",
      portrait:`Tu représentes le niveau le plus intégré de l'estime de soi : une confiance qui ne cherche plus à se prouver, qui ne compense rien, et qui se tourne naturellement vers quelque chose à créer ou à transmettre.\n\nIl y a en toi une dimension créatrice au sens large — l'idée d'apporter une valeur ajoutée au monde, de laisser une trace qui a du sens. Ce n'est pas nécessairement artistique : ça peut prendre la forme d'un projet, d'une façon d'être en contact avec les autres, ou d'un engagement dans quelque chose de plus grand que soi.\n\nTu es plus un facteur de résilience qu'un facteur de risque — pour toi, mais aussi pour ceux qui t'entourent. Ta stabilité intérieure crée de l'espace pour les autres sans que tu aies besoin de t'effacer ou de briller pour cela.`,
      forces:["Confiance pleinement intégrée, sans besoin de la prouver","Élan créateur orienté vers quelque chose de sens","Résilience forte face aux épreuves et aux critiques","Présence stabilisante pour les personnes autour de toi"],
      points:["Peut être peu compris(e) par des profils plus insécures","Risque de sous-estimer ses propres besoins au profit des autres","Les périodes de doute peuvent surprendre par contraste avec l'habituel"],
      conseils:["💬 Ta confiance est une ressource rare — mais elle mérite d'être nourrie consciemment. Se demander ce qu'on veut vraiment créer ou transmettre reste une question précieuse, même à ce niveau.","💬 L'enjeu pour toi n'est souvent pas de construire l'estime, mais de l'orienter. Vers quoi veux-tu diriger cette énergie créatrice ? Cette question peut devenir un axe de développement profond.","💬 Ton équilibre peut être mis à l'épreuve par des environnements ou des relations très déséquilibrés. Identifier ce qui te ressource réellement est une façon de rester ancré(e) dans la durée."]},

    // ─── TROUBLES HYPO ───────────────────────────────────────────────────────────
    UTILISE: {id:"UTILISE", famille:"Hypo", niveau:"trouble", label:"L'Utilisé(e)", icon:"🌫️", color:"#3A4E80", light:"#E8EBF5", border:"#8E9DC8", famColor:"#5A6E9E", famBg:"#E8ECF6",
      resume:"Tu vas vers les besoins de l'autre avant même de consulter les tiens — et tu t'es organisé(e), souvent inconsciemment, pour attirer des situations où tu es en position de donner sans recevoir. Quelque chose en toi a normalisé le fait d'être en second plan, voire d'être maltraité(e).",
      portrait:`L'effacement, dans sa forme la plus ancrée, ne se contente plus de disparaître en retrait. Il organise la vie autour de l'autre — et parfois autour des personnes qui prendront ce qu'on leur offre sans le nommer ni le rendre.\n\nTu peux te retrouver régulièrement dans des situations de maltraitance relationnelle, professionnelle ou affective — non par hasard, mais parce qu'une partie de toi a intégré que c'est la place qui te revient. Il n'y a pas de jugement là-dedans : c'est une adaptation ancienne, construite pour survivre dans un environnement qui ne t'a pas laissé plus de place.\n\nLes personnes à fort ego ont souvent un «radar» pour repérer ceux qui ne défendent pas leur place. Tu ne les attires pas parce que tu es faible — mais parce que tu n'as pas encore pleinement intégré que ta présence a de la valeur en elle-même.`,
      forces:["Empathie profonde et sens aigu des besoins de l'autre","Douceur et discrétion dans les relations","Grande capacité d'adaptation","Potentiel de transformation important une fois le travail enclenché"],
      points:["Tendance à normaliser des situations maltraitantes ou exploitantes","Difficulté forte à poser des limites ou exprimer ses besoins","Peut inconsciemment faciliter le harcèlement ou l'exploitation","Estime de soi très fragilisée au niveau fondamental"],
      conseils:["💬 Ce n'est pas ta faute — et ce n'est pas non plus ta nature. C'est une façon apprise, souvent très tôt, de te rendre acceptable. Elle peut évoluer, mais cela demande un espace sécurisé et un accompagnement patient.","💬 Sortir de ce pattern ne passe pas par plus d'efforts envers les autres — ça passe par apprendre à consulter ton propre besoin avant de répondre à celui de l'autre. Un réflexe à cultiver progressivement.","💬 Un accompagnement thérapeutique est fortement recommandé. Ce niveau d'effacement mérite un espace pour explorer d'où il vient, ce qu'il protège — et comment reconstruire ta place."]},

    SCEPTIQUE: {id:"SCEPTIQUE", famille:"Hypo", niveau:"trouble", label:"Le/La Sceptique", icon:"🌀", color:"#5E4E98", light:"#EDEAF7", border:"#B0A8DC", famColor:"#5A6E9E", famBg:"#E8ECF6",
      resume:"Tu t'auto-invalides en permanence — non seulement tes choix, mais toi-même, et parfois l'humanité entière. Le discours intérieur est très négatif, l'imaginaire sombre, et une angoisse profonde s'exprime à travers un doute qui ne s'arrête jamais.",
      portrait:`Le doute, à ce niveau, n'est plus un outil de réflexion — c'est une façon de vivre. Une angoisse profonde qui s'exprime non pas en cris, mais en hésitations perpétuelles, en remises en question qui ne trouvent jamais de résolution.\n\nTu doutes de toi avec une intensité particulière : non seulement de tes choix, mais de ta valeur, de tes capacités, de ta légitimité. Tu doutes aussi des autres et de la manière dont les choses peuvent s'arranger — le monde lui-même semble peu fiable.\n\nTon discours intérieur est nourri de scénarios sombres. Ton imaginaire anticipe le pire avec une constance qui épuise. Ce n'est pas du pessimisme intellectuel : c'est une angoisse qui n'a pas trouvé d'autre langage pour se dire.`,
      forces:["Profondeur d'analyse et de réflexion réelle","Sensibilité fine aux nuances et aux contradictions","Capacité à percevoir ce que d'autres ne voient pas","Fort potentiel de transformation avec un accompagnement adapté"],
      points:["Auto-invalidation permanente, avant même d'avoir essayé","Discours intérieur et imaginaire très négatifs","Doute de soi, des autres et du monde simultanément","Angoisse chronique souvent non nommée comme telle"],
      conseils:["💬 Ce niveau de doute est une souffrance réelle — pas un trait de caractère immuable. L'identifier clairement comme un symptôme, et non comme une vérité sur toi ou le monde, est déjà un premier acte thérapeutique.","💬 Le travail ici n'est pas «apprendre à décider» — c'est d'aller toucher l'angoisse sous-jacente. Les approches thérapeutiques ciblées (TCC, thérapies corporelles) peuvent créer des changements significatifs.","💬 Un accompagnement professionnel est fortement recommandé. Ce niveau de scepticisme et d'auto-invalidation mérite un espace sécurisé pour être exploré et transformé en profondeur."]},

    // ─── TROUBLES HYPER ──────────────────────────────────────────────────────────
    MEPRISANT: {id:"MEPRISANT", famille:"Hyper", niveau:"trouble", label:"Le/La Méprisant(e)", icon:"🔥", color:"#B06020", light:"#FCF0E8", border:"#E8B080", famColor:"#B85C2E", famBg:"#FDF0E8",
      resume:"Ta façon de couvrir tes failles profondes passe par l'attaque : pointer les erreurs des autres, les regarder de haut, critiquer avec un mépris qui maintient les autres à distance et toi en position dominante. La vulnérabilité est là — elle se convertit en offensive.",
      portrait:`La flamboyance, dans sa forme la plus défensive, se transforme en arme. Ce n'est plus seulement briller — c'est s'assurer que les autres ne brillent pas trop près. La critique méprisante, le doigt pointé sur les failles de l'autre, le regard qui regarde de haut : autant de façons de garder l'avantage.\n\nTu es très vulnérable à la critique — mais cette vulnérabilité, tu ne peux pas te permettre de la montrer. Alors elle se convertit en attaque préventive : invalider l'autre avant qu'il ne puisse t'invalider.\n\nIl y a une vraie intelligence dans ce fonctionnement — une lecture fine des gens, une capacité à percevoir leurs failles. Mais utilisée ainsi, elle coupe le contact réel et maintient une solitude que la mise en scène de soi ne comble pas.`,
      forces:["Intelligence acérée et lecture fine des personnes","Capacité à tenir une position malgré la pression","Présence forte et remarquée","Potentiel de leadership réel si les défenses s'assouplissent"],
      points:["Mépris et attaques qui abîment durablement les relations","Vulnérabilité profonde masquée derrière l'offensive","Difficulté à laisser l'autre exister pleinement","Solitude relationnelle souvent non reconnue comme telle"],
      conseils:["💬 Le mépris est presque toujours une façon de ne pas montrer qu'on a peur. Se demander «de quoi est-ce que je me protège en ce moment ?» peut ouvrir vers quelque chose de plus vrai.","💬 Un travail sur la vulnérabilité — pas pour l'exposer aux autres, mais pour te permettre de la connaître toi-même — est souvent central à ce niveau d'estime.","💬 La dépression narcissique est un risque réel avec l'âge ou les revers importants. Un accompagnement avant d'en arriver là est toujours plus efficace que la gestion de crise."]},

    GRANDIOSE: {id:"GRANDIOSE", famille:"Hyper", niveau:"trouble", label:"Le/La Grandiose", icon:"☁️", color:"#6A58A8", light:"#EEEAF8", border:"#B8B0E0", famColor:"#B85C2E", famBg:"#FDF0E8",
      resume:"Tes aspirations sont d'une hauteur difficile à habiter concrètement. L'image de toi-même est grandiose — mais l'énergie reste bloquée dans la démesure, incapable de se déposer dans quelque chose de réel et de limité.",
      portrait:`Ce n'est pas le désir d'être grand(e) qui pose problème — c'est que l'idée de toi-même dépasse tellement le concret qu'il n'y a plus rien de réalisable qui soit à la hauteur. La grandiosité n'est pas un rêve qu'on vise : c'est un état où l'on est déjà, dans la tête, et qui rend tout le reste décevant d'avance.\n\nTu enchaînes peut-être les formations, les projets, les plans — sans jamais les finaliser ni t'en servir. Pas par paresse, mais parce que l'agir se confronte à la limite, et la limite serait insupportable à la hauteur de l'image que tu as de toi.\n\nIl y a une vraie démesure dans ce que tu imagines. Et cette démesure bloque l'énergie : elle ne peut pas aller se confronter au principe de réalité sans risquer d'effondrer quelque chose de fondamental.`,

  // ─── SCORING ─────────────────────────────────────────────────────────────────
  function computeAll(answers){
    // Types
    const typeRaw={CONFIANT:0,EFFACE:0,DOUTANT:0,FLAMBOYANT:0,SOUHAIT:0,COMBAT:0};
    ALL_QUESTIONS.forEach(q=>{ typeRaw[q.type]+=(answers[q.id]||0); });
    // Count questions per type
    const typeCount={CONFIANT:0,EFFACE:0,DOUTANT:0,FLAMBOYANT:0,SOUHAIT:0,COMBAT:0};
    ALL_QUESTIONS.forEach(q=>{ typeCount[q.type]++; });
    const typePct={};
    Object.keys(typeRaw).forEach(k=>{ typePct[k]=Math.round((typeRaw[k]/(typeCount[k]*5))*100); });
    // Tri par POURCENTAGE (pas raw) pour éviter le biais lié au nombre de questions par type
    const primaryType=Object.entries(typePct).sort((a,b)=>b[1]-a[1])[0][0];

    // Dimensions
    const dimRaw={QJS:0,RDS:0,ADS:0,VAL:0};
    const dimCount={QJS:0,RDS:0,ADS:0,VAL:0};
    ALL_QUESTIONS.forEach(q=>{
      if(!q.dim) return;
      const val=answers[q.id]||0;
      dimRaw[q.dim] += q.dimDir===+1 ? val : (6-val);
      dimCount[q.dim]++;
    });
    const dimPct={};
    Object.keys(dimRaw).forEach(k=>{ dimPct[k]=dimCount[k]>0?Math.round((dimRaw[k]/(dimCount[k]*5))*100):50; });
    const dimGlobal=Math.round((dimPct.QJS+dimPct.RDS+dimPct.ADS+dimPct.VAL)/4);

    // Escalation vers trouble ou métabolisé avancé selon l'intensité du score dominant
    const TROUBLE_MAP={EFFACE:"UTILISE",DOUTANT:"SCEPTIQUE",FLAMBOYANT:"MEPRISANT",SOUHAIT:"GRANDIOSE",COMBAT:"COMBAT_TROUBLE"};
    let resultType=primaryType;
    const primaryPct=typePct[primaryType];
    if(primaryType==="CONFIANT"&&primaryPct>=75){resultType="CONFIANT_CREATEUR";}
    else if(TROUBLE_MAP[primaryType]&&primaryPct>=73){resultType=TROUBLE_MAP[primaryType];}

    return{typeRaw,typePct,primaryType,resultType,dimPct,dimGlobal};
  }

  function ProgressBar({step,total}){
    const pct=((step-1)/(total-1))*100;
    const t=THEMES[step-1];
    return(
      <div style={{marginBottom:20}}>

          <div style={{fontSize:12,color:MID,fontStyle:"italic"}}>{t?.icon} {t?.title}</div>

        <div style={{background:"#e0d8d0",borderRadius:8,height:5,overflow:"hidden"}}>
          <div style={{width:`${pct}%`,height:"100%",background:ACCENT,borderRadius:8,transition:"width 0.4s ease"}}/>
        </div>
      </div>
    );
  }

  function LikertQuestion({question,value,onChange,index}){
    const tColor = question.dim ? DIMS[question.dim].color : TYPES[question.type].color;
    return(
      <div className="fade-up" style={{marginBottom:24,animationDelay:`${index*0.07}s`}}>
        <div style={{fontSize:13,color:DARK,lineHeight:1.75,marginBottom:12,fontStyle:"italic",paddingLeft:12,borderLeft:`3px solid ${tColor}`}}>

          {LIKERT.map(l=>{

                flex:"1 1 0",padding:"9px 4px",borderRadius:9,textAlign:"center",cursor:"pointer",
                border:`2px solid ${active?tColor:"#e0d4c8"}`,background:active?tColor:"#fff",

                <div style={{fontSize:8,opacity:0.85}}>{l.label}</div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  function TriangleChart({dimPct}){
    const W=300,H=265,cx=150,cy=140,R=95;
    const toRad=d=>d*Math.PI/180;
    const verts=[
      {x:cx,y:cy-R,dim:"QJS"},
      {x:cx-R*Math.cos(toRad(30)),y:cy+R*Math.sin(toRad(30)),dim:"RDS"},
      {x:cx+R*Math.cos(toRad(30)),y:cy+R*Math.sin(toRad(30)),dim:"ADS"},
    ];
    const pts=verts.map(v=>({x:cx+(v.x-cx)*(dimPct[v.dim]/100),y:cy+(v.y-cy)*(dimPct[v.dim]/100),dim:v.dim}));
    const poly=pts.map(p=>`${p.x},${p.y}`).join(" ");
    const bgPoly=verts.map(v=>`${v.x},${v.y}`).join(" ");
    const midPoly=verts.map(v=>`${cx+(v.x-cx)*0.5},${cy+(v.y-cy)*0.5}`).join(" ");
    return(
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:300,display:"block",margin:"0 auto"}}>
        <polygon points={bgPoly} fill="none" stroke="#ddd4ca" strokeWidth="1.5" strokeDasharray="4 3"/>
        <polygon points={midPoly} fill="none" stroke="#ddd4ca" strokeWidth="1" strokeDasharray="2 3"/>
        {verts.map((v,i)=><line key={i} x1={cx} y1={cy} x2={v.x} y2={v.y} stroke="#ddd4ca" strokeWidth="1"/>)}
        <polygon points={poly} fill={ACCENT+"20"} stroke={ACCENT} strokeWidth="2"/>
        {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={5} fill={DIMS[p.dim].color} stroke="#fff" strokeWidth="2"/>)}
        {verts.map((v,i)=>{
          const ox=(v.x-cx)*0.32,oy=(v.y-cy)*0.32;
          return(
            <g key={i}>
              <text x={v.x+ox} y={v.y+oy-(oy<0?10:-2)} textAnchor="middle" fontSize="10" fill={DIMS[v.dim].color} fontWeight="bold" fontFamily="Georgia,serif">{DIMS[v.dim].icon} {DIMS[v.dim].label}</text>
              <text x={v.x+ox} y={v.y+oy+(oy<0?2:12)} textAnchor="middle" fontSize="12" fill={DIMS[v.dim].color} fontFamily="Georgia,serif" fontWeight="bold">{dimPct[v.dim]}%</text>
            </g>
          );
        })}
      </svg>
    );
  }

  function GlobalGauge({pct}){
    const lv=getLevel(pct);
    const toRad=d=>d*Math.PI/180;
    const r=55,cx=90,cy=75;
    const angle=(pct/100)*180;
    const ax=cx+r*Math.cos(toRad(180-angle)),ay=cy-r*Math.sin(toRad(180-angle));
    const arc=(a1,a2,rr)=>{
      const x1=cx+rr*Math.cos(toRad(180-a1)),y1=cy-rr*Math.sin(toRad(180-a1));
      const x2=cx+rr*Math.cos(toRad(180-a2)),y2=cy-rr*Math.sin(toRad(180-a2));
      return`M ${x1} ${y1} A ${rr} ${rr} 0 0 1 ${x2} ${y2}`;
    };
    return(
      <div style={{textAlign:"center"}}>
        <svg viewBox="0 0 180 92" style={{width:"100%",maxWidth:210,display:"block",margin:"0 auto"}}>
          <path d={arc(0,180,r)} fill="none" stroke="#e0d8d0" strokeWidth="13" strokeLinecap="round"/>
          <path d={arc(0,angle,r)} fill="none" stroke={lv.color} strokeWidth="13" strokeLinecap="round" style={{transition:"all 1.5s cubic-bezier(0.23,1,0.32,1)"}}/>
          <line x1={cx} y1={cy} x2={ax} y2={ay} stroke={DARK} strokeWidth="2.5" strokeLinecap="round"/>
          <circle cx={cx} cy={cy} r={4} fill={DARK}/>
          <text x={cx} y={cy+16} textAnchor="middle" fontSize="17" fontWeight="bold" fill={lv.color} fontFamily="Georgia,serif">{pct}%</text>
          <text x={16} y={88} fontSize="8" fill={LIGHT} fontFamily="Georgia,serif">Fragilisée</text>
          <text x={128} y={88} fontSize="8" fill={LIGHT} fontFamily="Georgia,serif">Solide</text>
        </svg>
        <div style={{fontSize:12,fontWeight:"bold",color:lv.color,marginTop:2}}>{lv.label}</div>
        <div style={{fontSize:10,color:MID,fontStyle:"italic",marginTop:2}}>Score global d'estime de soi</div>
      </div>
    );
  }

        <div style={{background:"#fff",borderRadius:12,padding:20,marginBottom:14,border:"1px solid #e8ddd4"}}>
          <div style={{fontSize:13,fontWeight:"bold",color:DARK,marginBottom:4}}>📐 Le triangle de l'estime de soi</div>
          <div style={{fontSize:11,color:MID,fontStyle:"italic",marginBottom:16,lineHeight:1.6}}>Les 3 dimensions fondamentales. La boussole des valeurs est affichée séparément ci-dessous.</div>
          <TriangleChart dimPct={scores.dimPct}/>
          <div style={{marginTop:16,paddingTop:14,borderTop:"1px solid #f0ebe5",textAlign:"center"}}>
            <GlobalGauge pct={scores.dimGlobal}/>
          </div>
        </div>

        {/* ── DIMENSIONS ── */}
        <div style={{background:"#fff",borderRadius:12,padding:20,marginBottom:14,border:"1px solid #e8ddd4"}}>
          <div style={{fontSize:13,fontWeight:"bold",color:DARK,marginBottom:14}}>🔬 Bilan dimension par dimension</div>
          {["QJS","RDS","ADS","VAL"].map(k=>{
            const d=DIMS[k],p=scores.dimPct[k],lv=getLevel(p),profile=getDimProfile(k,p);
            return(
              <div key={k} style={{background:"#fff",borderRadius:10,padding:16,marginBottom:10,border:`1px solid ${d.border}`,borderLeft:`4px solid ${d.color}`}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:16}}>{d.icon}</span>
                    <div>
                      <div style={{fontSize:12,fontWeight:"bold",color:d.color}}>{d.label}</div>
                      <span style={{fontSize:9,padding:"2px 7px",borderRadius:8,background:lv.bg,color:lv.color,fontWeight:"bold",border:`1px solid ${lv.border}`,display:"inline-block",marginTop:2}}>{lv.label}</span>
                    </div>
                  </div>
                  <div style={{fontSize:20,fontWeight:"bold",color:d.color}}>{p}%</div>
                </div>
                <div style={{background:"#e0d8d0",borderRadius:6,height:6,overflow:"hidden",marginBottom:10}}>
                  <div style={{width:`${p}%`,height:"100%",background:d.color,borderRadius:6,transition:"width 1.3s cubic-bezier(0.23,1,0.32,1)"}}/>
                </div>
                <div style={{fontSize:11,fontWeight:"bold",color:d.color,marginBottom:4}}>{profile.titre}</div>
                <p style={{fontSize:11,color:MID,lineHeight:1.75,fontStyle:"italic",margin:0}}>{profile.texte}</p>
              </div>
            );
          })}
        </div>

        {/* ── PORTRAIT ── */}
        <div style={{background:"#fff",borderRadius:12,padding:20,marginBottom:14,border:`1px solid ${result.border}`,borderLeft:`4px solid ${result.color}`}}>
          <div style={{fontSize:13,fontWeight:"bold",color:result.color,marginBottom:12}}>📖 Portrait — {result.label}</div>
          {result.portrait.split("\n\n").map((para,i)=>(
            <p key={i} style={{fontSize:12,color:MID,lineHeight:1.85,fontStyle:"italic",marginBottom:i<result.portrait.split("\n\n").length-1?12:0}}>{para}</p>
          ))}
        </div>

        {/* ── FORCES & POINTS ── */}
        <div style={{background:"#fff",borderRadius:12,padding:20,marginBottom:14,border:"1px solid #e8ddd4"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div style={{background:"#f0fdf4",borderRadius:10,padding:14,border:"1px solid #c8e6c9"}}>
              <div style={{fontSize:10,fontWeight:"bold",color:"#2e7d32",marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>✓ Tes forces</div>
              {result.forces.map((f,i)=><div key={i} style={{fontSize:11,color:DARK,marginBottom:6,lineHeight:1.55}}>• {f}</div>)}
            </div>
            <div style={{background:"#fff8f0",borderRadius:10,padding:14,border:"1px solid #ffcc80"}}>
              <div style={{fontSize:10,fontWeight:"bold",color:"#e65100",marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>⚠ Points d'attention</div>
              {result.points.map((p,i)=><div key={i} style={{fontSize:11,color:DARK,marginBottom:6,lineHeight:1.55}}>• {p}</div>)}
            </div>
          </div>
        </div>

        {/* ── TYPE SECONDAIRE ── */}
        {secondType&&secondType[1]>=30&&(
          <div style={{background:BG2,borderRadius:12,padding:16,marginBottom:14,border:"1px solid #e8ddd4"}}>
            <div style={{fontSize:12,fontWeight:"bold",color:DARK,marginBottom:6}}>
              {TYPES[secondType[0]].icon} Couleur secondaire notable : {TYPES[secondType[0]].label} ({secondType[1]}%)
            </div>
            <p style={{fontSize:11,color:MID,lineHeight:1.75,fontStyle:"italic"}}>
              {secondType[0]==="CONFIANT"&&"Des ressources sécures bien présentes viennent tempérer ton type dominant — une capacité à revenir à toi que tu sous-estimes peut-être."}
              {secondType[0]==="EFFACE"&&"Une tendance à l'effacement vient en second plan — dans certains contextes, tu peux avoir du mal à tenir ta place."}
              {secondType[0]==="DOUTANT"&&"Des moments de doute intense peuvent coexister avec ton profil dominant — une voix qui hésite juste derrière la façade."}
              {secondType[0]==="FLAMBOYANT"&&"Une tendance flamboyante vient compléter ton profil — le besoin d'être vu(e) et reconnu(e) n'est jamais très loin."}
              {secondType[0]==="SOUHAIT"&&"Une part souhaitante reste active — des aspirations grandioses qui coexistent avec ton style dominant, sans toujours trouver leur traduction concrète."}
              {secondType[0]==="COMBAT"&&"Une énergie combattante est présente en second plan — elle peut être une ressource ou devenir un réflexe d'opposition selon les contextes."}
            </p>
          </div>
        )}

        {/* ── CONSEILS ── */}
        <div style={{background:"#fff",borderRadius:12,padding:20,marginBottom:14,border:"1px solid #e8ddd4"}}>
          <div style={{fontSize:13,fontWeight:"bold",color:DARK,marginBottom:14}}>💬 Pistes de travail</div>
          {result.conseils.map((c,i)=>(
            <div key={i} style={{marginBottom:10,padding:"10px 14px",borderRadius:8,background:"#FFF8F2",border:"1px dashed rgba(139,111,94,0.4)",fontSize:12,color:MID,fontStyle:"italic",lineHeight:1.75}}>{c}</div>
          ))}
        </div>

        <div style={{padding:"12px 16px",borderRadius:8,background:"#fff8f0",border:"1px solid #f0e0c8",fontSize:11,color:MID,fontStyle:"italic",lineHeight:1.7,marginBottom:20}}>
          ⚠️ Ces résultats sont indicatifs et basés sur tes propres réponses. Ils ne constituent pas un diagnostic clinique et ne remplacent pas un accompagnement professionnel.
        </div>

        {/* ── CTA ── */}
        <div style={{background:"linear-gradient(135deg,#fdf6ed,#f5ece0)",borderRadius:14,padding:22,marginBottom:14,border:`1px solid ${ACCENT}40`,textAlign:"center"}}>
          <div style={{fontSize:20,marginBottom:8}}>🌱</div>
          <div style={{fontSize:14,fontWeight:"bold",color:ACCENT,marginBottom:10}}>Tu veux aller plus loin ?</div>
          <p style={{fontSize:12,color:MID,lineHeight:1.8,marginBottom:16,fontStyle:"italic"}}>
            Connaître son type et son triangle d'estime est un point de départ. Le vrai travail commence quand on explore ce qui les a construits — et comment les faire évoluer.
          </p>
          <a href="https://resalib.fr/p/123056" target="_blank" rel="noopener noreferrer"
            style={{display:"inline-block",padding:"13px 28px",borderRadius:24,background:ACCENT,color:"#fff",fontSize:13,fontWeight:"bold",textDecoration:"none",boxShadow:`0 4px 14px ${ACCENT}40`}}>
            📞 Réserver mon appel découverte gratuit
          </a>
        </div>

        {/* ── EMAIL ── */}
        <div style={{background:"#fff",borderRadius:12,padding:20,border:"1px solid #e8ddd4"}}>
          <div style={{fontSize:13,fontWeight:"bold",color:DARK,marginBottom:4}}>📧 Recevoir mes résultats par e-mail</div>
          {email?<div style={{fontSize:12,color:MID,marginBottom:14}}>Les résultats seront envoyés à <b>{email}</b>.</div>:<div style={{fontSize:12,color:"#F57C00",marginBottom:14}}>⚠️ Aucune adresse e-mail renseignée.</div>}
          {sendStatus!=="success"&&(
            <button onClick={sendEmail} disabled={sendStatus==="sending"} style={{padding:"11px 24px",borderRadius:24,border:"none",background:sendStatus==="sending"?"#ccc":ACCENT,color:"#fff",fontSize:14,fontWeight:"bold",transition:"background 0.2s"}}>
              {sendStatus==="sending"?"📨 Envoi en cours…":"📧 Envoyer mes résultats"}
            </button>
          )}
          {sendStatus==="success"&&<div style={{display:"flex",alignItems:"center",gap:8,color:"#4CAF50",fontSize:13}}><span style={{fontSize:18}}>✓</span> Résultats envoyés à {email}</div>}
          {sendStatus==="error"&&(
            <div style={{marginTop:10,fontSize:12,color:"#E53935",background:"#ffebee",borderRadius:8,padding:"12px 14px",lineHeight:1.8}}>
              <b>✗ Envoi échoué.</b>
              {emailError&&<div style={{marginTop:6,fontFamily:"monospace",fontSize:11,background:"#fff0f0",padding:"6px 10px",borderRadius:6,color:"#c62828"}}>{emailError}</div>}
              <span onClick={sendEmail} style={{textDecoration:"underline",cursor:"pointer",marginTop:8,display:"inline-block",color:ACCENT}}>↺ Réessayer</span>
            </div>
          )}
          {sendStatus==="no-email"&&<div style={{marginTop:10,fontSize:12,color:"#F57C00",background:"#fff8f0",borderRadius:8,padding:"10px 14px"}}>⚠️ Renseigne ton e-mail à l'étape 1.</div>}
        </div>
      </div>
    );
  }

  function App(){
    const [step,setStep]=useState(0);
    const [prenom,setPrenom]=useState("");
    const [email,setEmail]=useState("");
    const [answers,setAnswers]=useState({});
    const topRef=useRef(null);
    const N=THEMES.length;

    useEffect(()=>{ if(topRef.current)topRef.current.scrollIntoView({behavior:"smooth"}); },[step]);

    const currentTheme=step>=1&&step<=N?THEMES[step-1]:null;
    const currentQs=currentTheme?currentTheme.qids.map(id=>ALL_QUESTIONS.find(q=>q.id===id)).filter(Boolean):[];
    const themeAnswered=currentQs.length>0?currentQs.every(q=>answers[q.id]!==undefined):true;
    const scores=step===N+1?computeAll(answers):null;

    return(
      <div ref={topRef} style={{minHeight:"100vh",background:BG,padding:"32px 16px",fontFamily:"Georgia,serif"}}>
        <div style={{maxWidth:640,margin:"0 auto"}}>

          <div style={{marginBottom:step===0?28:16}}>
            {step===0?(
              <>
                <div style={{fontSize:24,fontWeight:"bold",color:DARK,marginBottom:4}}>Mon estime de soi</div>
                <div style={{fontSize:13,color:MID,fontStyle:"italic",lineHeight:1.6}}>52 questions · 9 thèmes · Type & Triangle</div>
              </>
            ):step<=N?<ProgressBar step={step} total={N}/>:null}
          </div>

          {step===0&&(
            <div className="fade-up">
              <div style={{background:"#fff",borderRadius:12,padding:22,marginBottom:16,border:"1px solid #e8ddd4"}}>
                <p style={{fontSize:13,color:DARK,lineHeight:1.9,marginBottom:16}}>
                  Ce questionnaire combine deux évaluations : ton <b>profil d'estime de soi</b> parmi 12 possibles (6 traits de base, 1 métabolisé avancé, 5 troubles), et ton <b>triangle de l'estime</b> sur 4 dimensions fondamentales.
                </p>
                <div style={{marginBottom:14}}>
                  {[
                    {famille:"Métabolisé", color:"#4A7C6E", bg:"#EBF5F2", border:"#A8D4CA", types:["CONFIANT","CONFIANT_CREATEUR"]},
                    {famille:"Hypo", color:"#5A6E9E", bg:"#E8ECF6", border:"#B8C4DC", types:["EFFACE","UTILISE","DOUTANT","SCEPTIQUE"]},
                    {famille:"Hyper", color:"#B85C2E", bg:"#FDF0E8", border:"#E8C09A", types:["FLAMBOYANT","MEPRISANT","SOUHAIT","GRANDIOSE","COMBAT","COMBAT_TROUBLE"]},
                  ].map(grp=>(
                    <div key={grp.famille} style={{marginBottom:10,padding:"10px 12px",borderRadius:9,background:grp.bg,border:`1px solid ${grp.border}`}}>
                      <div style={{fontSize:9,fontWeight:"bold",color:grp.color,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:7}}>{grp.famille}</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {grp.types.map(id=>{
                          const t=TYPES[id];
                          return(
                            <div key={id} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 8px",borderRadius:7,background:"#fff",border:`1px solid ${t.color}40`}}>
                              <span style={{fontSize:11}}>{t.icon}</span>
                              <span style={{fontSize:10,color:t.color,fontWeight:"bold"}}>{t.label}</span>
                              <span style={{fontSize:8,padding:"1px 5px",borderRadius:6,background:t.color+"20",color:t.color,border:`1px solid ${t.color}40`}}>{t.niveau==="métabolisé"?"Métabolisé":t.niveau==="trouble"?"Trouble":"Trait"}</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{padding:"10px 12px",borderRadius:9,background:"#f5f0ed",border:`1px solid ${ACCENT}30`}}>
                  <div style={{fontSize:9,fontWeight:"bold",color:ACCENT,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:7}}>Triangle & boussole</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {Object.values(DIMS).map(d=>(
                      <div key={d.id} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 8px",borderRadius:7,background:"#fff",border:`1px solid ${d.color}40`}}>
                        <span style={{fontSize:11}}>{d.icon}</span>
                        <span style={{fontSize:10,color:d.color,fontWeight:"bold"}}>{d.label}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              <div style={{background:BG2,borderRadius:12,padding:20,marginBottom:16,border:"1px solid #e8ddd4"}}>
                <div style={{fontSize:13,fontWeight:"bold",color:DARK,marginBottom:14}}>Quelques infos pour personnaliser tes résultats</div>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:12,color:MID,marginBottom:4,fontWeight:"bold"}}>Prénom</div>
                  <input value={prenom} onChange={e=>setPrenom(e.target.value)} placeholder="Ton prénom..." style={{width:"100%",padding:"10px 14px",borderRadius:8,border:"1.5px solid #e0d4c8",background:"#fff",fontSize:14,color:DARK,outline:"none"}}/>
                </div>
                <div>
                  <div style={{fontSize:12,color:MID,marginBottom:4,fontWeight:"bold"}}>Adresse e-mail</div>
                  <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="ton@email.com" style={{width:"100%",padding:"10px 14px",borderRadius:8,border:"1.5px solid #e0d4c8",background:"#fff",fontSize:14,color:DARK,outline:"none"}}/>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginTop:8,background:"#f0fdf4",borderRadius:8,padding:"8px 12px"}}>
                    <span>🔒</span><span style={{fontSize:11,color:"#4CAF50",fontStyle:"italic"}}>Uniquement pour t'envoyer tes résultats. Aucun spam.</span>
                  </div>
                </div>
              </div>

              <div style={{fontSize:12,color:LIGHT,fontStyle:"italic",marginBottom:16,lineHeight:1.7,padding:"10px 14px",background:"#fff",borderRadius:8,border:"1px solid #e8ddd4"}}>
                ℹ️ Réponds spontanément — il n'y a pas de bonnes ou mauvaises réponses. Le questionnaire prend environ 10–12 minutes.
              </div>
            </div>
          )}

          {currentTheme&&(
            <div className="fade-up" key={step}>
              <div style={{marginBottom:22,padding:"14px 16px",background:"#fff",borderRadius:10,border:"1px solid #e0d4c8",borderLeft:`4px solid ${ACCENT}`}}>
                <div style={{fontSize:15,fontWeight:"bold",color:DARK,marginBottom:3}}>{currentTheme.icon} {currentTheme.title}</div>
              </div>
              {currentQs.map((q,i)=>q?(
                <LikertQuestion key={q.id} question={q} value={answers[q.id]} onChange={val=>setAnswers(a=>({...a,[q.id]:val}))} index={i}/>
              ):null)}
              {!themeAnswered&&<div style={{fontSize:12,color:"#F57C00",fontStyle:"italic",marginBottom:12}}>⚠️ Réponds à toutes les affirmations pour continuer.</div>}
            </div>
          )}

          {step===N+1&&scores&&<Results scores={scores} prenom={prenom} email={email}/>}

          {step<=N&&(
            <div style={{display:"flex",justifyContent:"space-between",marginTop:24}}>
              {step>0?<button onClick={()=>setStep(s=>s-1)} style={{padding:"12px 24px",borderRadius:24,border:"1.5px solid #e0d4c8",background:"#fff",color:MID,fontSize:14}}>← Retour</button>:<div/>}
              <button onClick={()=>setStep(s=>s+1)} disabled={!themeAnswered&&step>0}
                style={{padding:"12px 28px",borderRadius:24,border:"none",background:(!themeAnswered&&step>0)?"#e0d4c8":ACCENT,color:"#fff",fontSize:14,fontWeight:"bold",opacity:(!themeAnswered&&step>0)?0.6:1,transition:"all 0.2s"}}>
                {step===0?"Commencer →":step===N?"Voir mes résultats →":"Continuer →"}
              </button>
            </div>
          )}
          {step===N+1&&(
            <div style={{marginTop:24,textAlign:"center"}}>
              <button onClick={()=>{setStep(0);setAnswers({});}} style={{padding:"12px 28px",borderRadius:24,border:`1.5px solid ${ACCENT}`,background:"transparent",color:ACCENT,fontSize:14}}>↺ Recommencer</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
